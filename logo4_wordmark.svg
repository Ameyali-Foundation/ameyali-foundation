<svg width="520" height="220" viewBox="0 0 520 220" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Ameyali Foundation wordmark">
  <defs>
    <style>
      .ink{fill:#2A1D12}.saddle{fill:#5A3D24}.grass{fill:#5C7548}.cream{fill:#F5EDDC}
      .word{font-family:'Fraunces',Georgia,serif;font-weight:500;letter-spacing:-0.005em;fill:#2A1D12}
      .sub{font-family:'DM Sans',system-ui,sans-serif;font-weight:600;letter-spacing:0.30em;fill:#5A3D24}
      .nah{font-family:'DM Sans',system-ui,sans-serif;font-weight:400;letter-spacing:0.04em;fill:#5C7548;font-style:italic}
    </style>
  </defs>
  <rect width="520" height="220" class="cream"/>
  <!-- Wordmark -->
  <text x="260" y="110" text-anchor="middle" class="word" font-size="76">Ameyali</text>
  <!-- water glyph: replace dot of the 'i' with a ripple drop -->
  <!-- approximate position of first 'i' dot; we overlay a drop -->
  <g transform="translate(312,40)">
    <path class="grass" d="M0,-2 C5,6 8,11 8,15 A8,8 0 1,1 -8,15 C-8,11 -5,6 0,-2 Z"/>
  </g>
  <!-- ripple line under wordmark -->
  <path d="M150,140 q14,-9 28,0 t28,0 t28,0 t28,0 t28,0 t28,0 t28,0" fill="none" stroke="#5C7548" stroke-width="2.5" stroke-linecap="round"/>
  <text x="260" y="172" text-anchor="middle" class="sub" font-size="14">FOUNDATION</text>
  <text x="260" y="196" text-anchor="middle" class="nah" font-size="12">"a spring of water" · Nahuatl</text>
</svg>
