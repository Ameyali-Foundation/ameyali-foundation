<svg width="600" height="320" viewBox="0 0 600 320" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="320" fill="#F5EDDC"/>
  <!-- V4: Eight small rider figures in a line — representing the full team -->
  <g transform="translate(40,100)">
    <!-- 8 mini rider silhouettes in a row, slightly staggered in height for movement feel -->
    <g id="rider">
      <!-- tiny horse body -->
      <ellipse cx="0" cy="18" rx="14" ry="9" fill="#2A1D12"/>
      <!-- legs -->
      <line x1="-8" y1="26" x2="-10" y2="40" stroke="#2A1D12" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="-3" y1="26" x2="-4" y2="40" stroke="#2A1D12" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="5" y1="26" x2="4" y2="40" stroke="#2A1D12" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="10" y1="25" x2="11" y2="40" stroke="#2A1D12" stroke-width="2.5" stroke-linecap="round"/>
      <!-- neck+head -->
      <path d="M-10,12 C-14,4 -14,-6 -10,-12 C-8,-16 -4,-14 -4,-10 L-6,8" fill="#2A1D12"/>
      <!-- rider torso -->
      <ellipse cx="0" cy="4" rx="5" ry="9" fill="#2A1D12"/>
      <!-- skirt drape -->
      <path d="M2,6 C8,8 14,14 16,22 C10,24 4,22 2,18 Z" fill="#5C7548"/>
      <!-- head -->
      <circle cx="0" cy="-8" r="4" fill="#2A1D12"/>
      <!-- sombrero -->
      <ellipse cx="0" cy="-10" rx="10" ry="2.2" fill="#5C7548"/>
      <path d="M-4,-10 C-4,-16 -1,-19 0,-19 C1,-19 4,-16 4,-10 Z" fill="#5C7548"/>
    </g>
  </g>
  <!-- Place 8 riders -->
  <use href="#rider" x="50" y="102"/>
  <use href="#rider" x="108" y="97"/>
  <use href="#rider" x="166" y="104"/>
  <use href="#rider" x="224" y="99"/>
  <use href="#rider" x="282" y="106"/>
  <use href="#rider" x="340" y="98"/>
  <use href="#rider" x="398" y="103"/>
  <use href="#rider" x="456" y="100"/>
  <!-- ground line -->
  <line x1="30" y1="248" x2="490" y2="248" stroke="#2A1D12" stroke-width="1.5" stroke-linecap="round" opacity="0.2"/>
  <!-- Wordmark below -->
  <text x="300" y="282" text-anchor="middle" font-family="'Fraunces',Georgia,serif" font-weight="600" font-size="36" letter-spacing="-0.5" fill="#2A1D12">Ameyali Foundation</text>
  <text x="300" y="305" text-anchor="middle" font-family="'DM Sans',sans-serif" font-weight="600" font-size="11" letter-spacing="4" fill="#5C7548">EIGHT RIDERS · ONE FAMILY</text>
</svg>
